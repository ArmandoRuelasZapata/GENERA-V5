# Gradle stability
org.gradle.daemon=true
org.gradle.parallel=false
org.gradle.configureondemand=true
org.gradle.caching=true
org.gradle.workers.max=3

# JVM memory (balanceado para 16GB RAM + que KDE no se congele)
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8 -XX:+HeapDumpOnOutOfMemoryError

# Kotlin daemon (si aplica por plugins)
kotlin.incremental=true
kotlin.daemon.jvm.options=-Xmx2048m

# AndroidX
android.useAndroidX=true
android.enableJetifier=true

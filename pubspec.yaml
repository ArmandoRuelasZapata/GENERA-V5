name: theoriginallab_v2
description: The Original Lab App - Rebuilt with Clean Architecture
publish_to: 'none'
version: 2.0.1+13
environment:
  sdk: ">=3.0.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  file_picker: ^8.1.2        # add this
  saver_gallery: ^3.0.6   
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # Routing
  go_router: ^14.0.0
  open_file: ^3.3.2
  # HTTP & Networking
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1
  connectivity_plus: ^6.0.0
  # Local Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.2
  # Functional Programming
  dartz: ^0.10.1
  # JSON Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  # UI & Design
  google_fonts: ^6.2.1
  flutter_screenutil: ^5.9.3
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10
  carousel_slider: ^5.0.0
  salomon_bottom_bar: ^3.3.2
  animations: ^2.0.11
  google_maps_flutter: ^2.5.3
  # Utilities
  logger: ^2.0.2
  intl: ^0.20.2
  url_launcher: ^6.2.4
  webview_flutter: ^4.7.0
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  firebase_analytics: ^12.0.1
  firebase_in_app_messaging: ^0.9.0+1
  flutter_local_notifications: ^17.0.0
  permission_handler: ^12.0.1
  flutter_localizations:
    sdk: flutter
  flutter_animate: ^4.5.2
  table_calendar: ^3.2.0
  image_picker: ^1.0.7
  crypto: ^3.0.7
  font_awesome_flutter: ^10.12.0
  envied: ^1.3.3
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # Code Generation
  build_runner: ^2.5.4
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.11
  # Testing
  mockito: ^5.4.4
  # App Icon Generator
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.10
  envied_generator: ^1.1.1
  # Código Qr
  qr_flutter: ^4.1.0

flutter_native_splash:
  color: "#021024"
  android_12:
    image: assets/tol_splash_android12.png
    color: "#021024"
    icon_background_color: "#021024"

flutter_icons:
  android: true
  ios: false
  image_path: "assets/tol_splash_android12.png"
  adaptive_icon_background: "#021024"
  adaptive_icon_foreground: "assets/tol_splash_android12.png"
  remove_alpha_ios: true


flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/images/casosexito/
    - assets/images/home/
    - assets/images/catalogo productos/
    - assets/images/genera_logo_white.png
    - assets/images/login_background.jpg
    - assets/images/genera_logo_color.png
    - assets/images/app_icon_color_credential.png
    - assets/images/logo_splash.png